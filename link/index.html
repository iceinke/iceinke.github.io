<script>
(function() {
  const bookmarkCategories = [
    {
      title: "📚 学术科研",
      links: [
        { url: "https://arxiv.org", name: "arXiv.org - Open-access archive for physics, mathematics, computer science etc." },
        { url: "https://inspirehep.net", name: "INSPIRE-HEP - The High Energy Physics information system" },
        { url: "https://cms.cern", name: "CMS Experiment at CERN - Compact Muon Solenoid" }
      ]
    },
    {
      title: "🛠️ 实用工具",
      links: [
        { url: "https://github.com", name: "GitHub - Let's build from here · Code, Collaborative version control" },
        { url: "https://deepl.com", name: "DeepL Translate - The world's most accurate translator" },
        { url: "https://www.worldtimebuddy.com/", name: "worldtimebuddy - Time Converter and World Clock" },
        { url: "https://www.when2meet.com/", name: "when2meet - 约定会议时间" },
        { url: "https://docsmall.com/", name: "docsmall - 免费的在线图片与 PDF 处理工具" },
        { url: "https://magiconch.com/patina/", name: "magiconch - 电子包浆" },
        { url: "https://apps.automeris.io/wpd4/index.zh_CN.html", name: "automeris - 提取图片中的数据点" },
        { url: "https://www.diffchecker.com/zh-Hans/image-compare/", name: "diffchecker - 比较图片之间的差异" },
        { url: "http://smartcurve.cn/curve-drawing", name: "smartcurve - 画函数曲线" },
        { url: "https://www.iloveimg.com/zh-cn", name: "iLoveIMG - 图像文件在线编辑工具"},
      ]
    },
    {
      title: "☕ 日常生活",
      links: [
        { url: "https://v2ex.com", name: "V2EX - 创意工作者的社区" },
        { url: "https://bilibili.com", name: "哔哩哔哩 (Bilibili) - 弹幕视频网" }
      ]
    }
  ];
  // ========================================================================

  // 提取域名的辅助函数
  function getCleanDomain(urlString) {
    try {
      const url = new URL(urlString);
      return url.hostname.replace('www.', '');
    } catch(e) {
      return '';
    }
  }

  // 自动渲染引擎
  const mainContainer = document.getElementById('all-bookmarks-container');
  if (mainContainer) {
    mainContainer.innerHTML = bookmarkCategories.map(category => {
      // 1. 生成每个分类的头部和包裹容器
      const linksHtml = category.links.map(item => {
        const domain = getCleanDomain(item.url);
        const iconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
        
        // 2. 生成单个卡片 HTML
        return `<a href="${item.url}" target="_blank" rel="noopener noreferrer" class="bookmark-item">` +
                 `<img src="${iconUrl}" srcset="/img/loading.gif" lazyload alt="icon" class="bookmark-icon">` +
                 `<span class="bookmark-name">${item.name}</span>` +
                 `<span class="bookmark-url">${domain}</span>` +
               `</a>`;
      }).join('');

      return `<div class="bookmark-category">` +
               `<h2 class="category-title">${category.title}</h2>` +
               `<div class="bookmark-list">${linksHtml}</div>` +
             `</div>`;
    }).join('');
  }
})();
</script>
