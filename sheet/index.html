<div id="sheet-container"></div>

<script>
    // 约定：每个曲目的乐谱图命名为 /postfigure/sheet/<id>-1.jpg, <id>-2.jpg ...
    const scores = [
        { id: 'wings_please', title: '翼をください', info: '' },
        { id: 'lemon', title: 'Lemon', info: '' },
        { id: 'tkzc', title: '天空之城', info: '' },
        { id: 'みちしるべ', title: 'みちしるべ', info: '' },
        { id: '双门洞', title: '双门洞', info: '' },
        { id: 'sincerely', title: 'sincerely', info: '' },
        { id: '残酷天使的行动纲领', title: '残酷天使的行动纲领', info: '' },
        { id: 'lightsong', title: 'light song', info: '' },
        // { id: 'jasmine_variation', title: '茉莉花变奏', pages: 3 },
        // { id: 'river_etude', title: '河畔练习曲', pages: 4 }
    ];

    const imageExt = 'jpg';
    const maxAutoPages = 50;
    const pageCountCache = new Map();
    let activeScore = null;
    let activePage = 1;
    let currentZoom = 1;
    let dragStartX = 0;
    let dragStartY = 0;
    let isDragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    // 创建 HTML 结构
    function createHTMLStructure() {
        const container = document.getElementById('sheet-container');
        if (!container) return;

        container.innerHTML = `
            <div id="score-grid" class="score-grid"></div>
            <div id="score-modal" class="score-modal" role="dialog" aria-modal="true" aria-label="乐谱查看器">
                <div class="score-modal-panel">
                    <div class="score-modal-header">
                        <h3 id="score-modal-title" class="score-modal-title"></h3>
                    </div>
                    <div class="score-viewer">
                        <div class="score-main">
                        <div class="score-main-image-wrap">
                            <img id="score-main-image" alt="乐谱页" />
                        </div>
                    </div>
                    <div class="score-controls">
                        <button id="score-prev" class="score-arrow prev" type="button" aria-label="上一页">&#8249;</button>
                        <button id="score-next" class="score-arrow next" type="button" aria-label="下一页">&#8250;</button>
                        <div class="score-zoom-group">
                            <button id="score-zoom-out" class="score-btn" type="button" aria-label="缩小">−</button>
                            <button id="score-zoom-reset" class="score-btn" type="button" aria-label="适配">⟲</button>
                            <button id="score-zoom-in" class="score-btn" type="button" aria-label="放大">+</button>
                            <span id="score-zoom-value" class="score-zoom-value">100%</span>
                        </div>
                        <button id="score-expand-all-btn" class="score-btn" type="button" aria-label="全部铺展">□</button>
                        <button id="score-clear-expand-btn" class="score-btn" type="button" aria-label="收起铺展">⊟</button>
                        <button id="score-modal-close" class="score-modal-close score-btn" type="button" aria-label="关闭">✕</button>
                    </div>
                    <span id="score-page-indicator"></span>
                        <div id="score-expanded" class="score-expanded"></div>
                    </div>
                </div>
            </div>
        `;
    }

    // 延迟获取 DOM 元素，确保它们已加载
    function getDOMElements() {
        return {
            scoreGrid: document.getElementById('score-grid'),
            modal: document.getElementById('score-modal'),
            modalTitle: document.getElementById('score-modal-title'),
            mainImage: document.getElementById('score-main-image'),
            mainImageWrap: document.querySelector('.score-main-image-wrap'),
            pageIndicator: document.getElementById('score-page-indicator'),
            expandedBox: document.getElementById('score-expanded')
        };
    }

    function buildImageUrl(scoreId, page) {
        return `/postfigure/sheet/${scoreId}-${page}.${imageExt}`;
    }

    function checkImageExists(url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = `${url}?t=${Date.now()}`;
        });
    }

    async function detectScorePages(score) {
        if (typeof score.pages === 'number' && score.pages > 0) {
            return score.pages;
        }

        if (pageCountCache.has(score.id)) {
            score.pages = pageCountCache.get(score.id);
            return score.pages;
        }

        let detectedPages = 0;
        for (let i = 1; i <= maxAutoPages; i++) {
            const exists = await checkImageExists(buildImageUrl(score.id, i));
            if (!exists) {
                break;
            }
            detectedPages = i;
        }

        score.pages = Math.max(1, detectedPages);
        pageCountCache.set(score.id, score.pages);
        return score.pages;
    }

    async function hydrateScorePages() {
        await Promise.all(scores.map((score) => detectScorePages(score)));
    }

    function applyZoom(value) {
        const { mainImage } = getDOMElements();
        const zoomValue = document.getElementById('score-zoom-value');
        if (!mainImage || !zoomValue) return;

        currentZoom = Math.min(3, Math.max(0.5, value));
        mainImage.style.setProperty('--score-zoom', String(currentZoom));
        zoomValue.textContent = `${Math.round(currentZoom * 100)}%`;
    }

    function renderCards() {
        const { scoreGrid } = getDOMElements();
        if (!scoreGrid) {
            console.error('score-grid element not found');
            return;
        }

        scores.forEach((score) => {
            const item = document.createElement('div');
            item.className = 'score-item';

            const stackBtn = document.createElement('button');
            stackBtn.className = 'score-stack';
            stackBtn.type = 'button';
            stackBtn.setAttribute('aria-label', `打开 ${score.title}`);

            if (score.pages > 1) {
                const layer1 = document.createElement('div');
                layer1.className = 'score-layer layer-1';
                const layer2 = document.createElement('div');
                layer2.className = 'score-layer layer-2';
                stackBtn.appendChild(layer1);
                stackBtn.appendChild(layer2);
            }

            const cover = document.createElement('div');
            cover.className = 'score-cover';

            const img = document.createElement('img');
            img.src = buildImageUrl(score.id, 1);
            img.alt = `${score.title} 封面`;
            cover.appendChild(img);

            const badge = document.createElement('span');
            badge.className = 'score-pages-badge';
            badge.textContent = `${score.pages} 页`;

            stackBtn.appendChild(cover);
            stackBtn.appendChild(badge);
            stackBtn.addEventListener('click', () => openScore(score));

            const title = document.createElement('div');
            title.className = 'score-title';
            title.textContent = score.title;

            const meta = document.createElement('div');
            meta.className = 'score-meta';
            meta.textContent = score.info || ` `; /*info 显示*/

            item.appendChild(stackBtn);
            item.appendChild(title);
            item.appendChild(meta);
            scoreGrid.appendChild(item);
        });
    }

    function setMainImage(page) {
        if (!activeScore) return;
        const { mainImage, pageIndicator } = getDOMElements();
        if (!mainImage || !pageIndicator) return;

        activePage = Math.min(Math.max(1, page), activeScore.pages);
        mainImage.src = buildImageUrl(activeScore.id, activePage);
        mainImage.alt = `${activeScore.title} 第 ${activePage} 页`;
        pageIndicator.textContent = `第 ${activePage} / ${activeScore.pages} 页`;
    }

    async function openScore(score) {
        const { modal, modalTitle, mainImageWrap } = getDOMElements();
        if (!modal || !modalTitle) return;

        await detectScorePages(score);
        activeScore = score;
        activePage = 1;
        modalTitle.textContent = score.title;
        setMainImage(1);
        applyZoom(1);
        dragOffsetX = 0;
        dragOffsetY = 0;
        if (mainImageWrap) mainImageWrap.style.transform = 'translate(0, 0)';
        clearExpanded();
        attachDragAndZoomHandlers();
        modal.classList.add('open');
        document.body.classList.add('sheet-modal-open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        const { modal } = getDOMElements();
        if (!modal) return;
        modal.classList.remove('open');
        document.body.classList.remove('sheet-modal-open');
        document.body.style.overflow = '';
    }

    function expandPages(count) {
        const { expandedBox } = getDOMElements();
        if (!expandedBox || !activeScore) return;

        expandedBox.innerHTML = '';

        for (let i = 1; i <= Math.min(count, activeScore.pages); i++) {
            const img = document.createElement('img');
            img.src = buildImageUrl(activeScore.id, i);
            img.alt = `页面 ${i}`;
            expandedBox.appendChild(img);
        }

        if (count > 0) {
            expandedBox.classList.add('active');
            const viewer = document.querySelector('.score-viewer');
            if (viewer) viewer.classList.add('expanded');
        }
    }

    function clearExpanded() {
        const { expandedBox } = getDOMElements();
        if (!expandedBox) return;
        expandedBox.innerHTML = '';
        expandedBox.classList.remove('active');
        const viewer = document.querySelector('.score-viewer');
        if (viewer) viewer.classList.remove('expanded');
    }

    function attachDragAndZoomHandlers() {
        const { mainImage, mainImageWrap, expandedBox } = getDOMElements();
        if (!mainImage) return;

        // 鼠标滚轮放缩 - 只在图片上有效
        const wheelHandler = (event) => {
            if (event.target.closest('img') || event.target === mainImage) {
                event.preventDefault();
                const delta = event.deltaY > 0 ? -0.04 : 0.04;
                applyZoom(currentZoom + delta);
            }
        };
        mainImage.addEventListener('wheel', wheelHandler, true);

        // 鼠标拖动 - 只在图片放大时有效
        mainImage.addEventListener('mousedown', (event) => {
            if (currentZoom <= 1) return;
            isDragging = true;
            dragStartX = event.clientX;
            dragStartY = event.clientY;
            mainImage.style.cursor = 'grabbing';
        });

        const handleMouseMove = (event) => {
            if (!isDragging || currentZoom <= 1) return;
            const deltaX = event.clientX - dragStartX;
            const deltaY = event.clientY - dragStartY;
            dragOffsetX += deltaX * 0.5;
            dragOffsetY += deltaY * 0.5;
            dragStartX = event.clientX;
            dragStartY = event.clientY;
            if (mainImageWrap) {
                mainImageWrap.style.transform = `translate(${dragOffsetX}px, ${dragOffsetY}px)`;
            }
        };

        const handleMouseUp = () => {
            isDragging = false;
            mainImage.style.cursor = 'grab';
        };

        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);

        // 触摸双指缩放
        let lastDistance = 0;
        mainImage.addEventListener('touchstart', (event) => {
            if (event.touches.length === 2) {
                const touch1 = event.touches[0];
                const touch2 = event.touches[1];
                lastDistance = Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);
            }
        });

        mainImage.addEventListener('touchmove', (event) => {
            if (event.touches.length === 2) {
                event.preventDefault();
                const touch1 = event.touches[0];
                const touch2 = event.touches[1];
                const currentDistance = Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);
                if (lastDistance > 0) {
                    const delta = (currentDistance - lastDistance) * 0.005;
                    applyZoom(currentZoom + delta);
                }
                lastDistance = currentDistance;
            }
        });
    }

    function attachEventListeners() {
        const prevBtn = document.getElementById('score-prev');
        const nextBtn = document.getElementById('score-next');
        const expandAllBtn = document.getElementById('score-expand-all-btn');
        const clearExpandBtn = document.getElementById('score-clear-expand-btn');
        const zoomInBtn = document.getElementById('score-zoom-in');
        const zoomOutBtn = document.getElementById('score-zoom-out');
        const zoomResetBtn = document.getElementById('score-zoom-reset');
        const closeBtn = document.getElementById('score-modal-close');
        const { modal } = getDOMElements();

        if (prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (!activeScore) return;
                const prev = activePage - 1 < 1 ? activeScore.pages : activePage - 1;
                setMainImage(prev);
            });
        }

        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (!activeScore) return;
                const next = activePage + 1 > activeScore.pages ? 1 : activePage + 1;
                setMainImage(next);
            });
        }

        if (expandAllBtn) {
            expandAllBtn.addEventListener('click', () => {
                if (!activeScore) return;
                expandPages(activeScore.pages);
            });
        }

        if (clearExpandBtn) {
            clearExpandBtn.addEventListener('click', clearExpanded);
        }

        if (zoomInBtn) {
            zoomInBtn.addEventListener('click', () => applyZoom(currentZoom + 0.2));
        }

        if (zoomOutBtn) {
            zoomOutBtn.addEventListener('click', () => applyZoom(currentZoom - 0.2));
        }

        if (zoomResetBtn) {
            zoomResetBtn.addEventListener('click', () => {
                applyZoom(1);
                dragOffsetX = 0;
                dragOffsetY = 0;
                const { mainImageWrap } = getDOMElements();
                if (mainImageWrap) mainImageWrap.style.transform = 'translate(0, 0)';
            });
        }

        if (closeBtn) {
            closeBtn.addEventListener('click', closeModal);
        }

        if (modal) {
            // 防止 modal 背景的点击传递
            modal.addEventListener('click', (event) => {
                if (event.target === modal) closeModal();
            });

            // 防止modal滚轮事件传递到页面
            modal.addEventListener('wheel', (event) => {
                // 只有在图片上时才处理
                if (event.target.closest('img') || event.target.closest('.score-main-image-wrap')) {
                    // 滚轮已在 attachDragAndZoomHandlers 中处理
                }
            }, { passive: false });
        }
    }

    async function initSheet() {
        createHTMLStructure();
        await hydrateScorePages();
        renderCards();
        attachEventListeners();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            initSheet();
        });
    } else {
        initSheet();
    }

    document.addEventListener('keydown', (event) => {
        const { modal } = getDOMElements();
        if (!modal || !modal.classList.contains('open')) return;
        if (event.key === 'Escape') closeModal();
        if (event.key === 'ArrowLeft') {
            const prevBtn = document.getElementById('score-prev');
            if (prevBtn) prevBtn.click();
        }
        if (event.key === 'ArrowRight') {
            const nextBtn = document.getElementById('score-next');
            if (nextBtn) nextBtn.click();
        }
        if (event.key === '+' || event.key === '=') applyZoom(currentZoom + 0.2);
        if (event.key === '-') applyZoom(currentZoom - 0.2);
    });
    
</script>
